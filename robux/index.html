<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111214;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
#gate{background:#191a1f;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:28px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px;text-align:center}
.g-logo{font-size:17px;font-weight:800;color:#f7f7f8}.g-logo span{color:#00b06c}
.g-title{font-size:20px;font-weight:800;color:#f7f7f8;letter-spacing:-.3px}
.g-sub{font-size:13px;color:#9a9fb0;line-height:1.5}
#keyInput{background:#202227;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:13px;color:#f7f7f8;font-family:monospace;font-size:15px;text-align:center;letter-spacing:1px;outline:none;transition:border-color .15s;width:100%}
#keyInput:focus{border-color:#335fff}
#keyInput::placeholder{color:#4a4f63;font-size:12px}
#unlockBtn{background:#335fff;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s}
#unlockBtn:hover{opacity:.88}
#unlockBtn:disabled{opacity:.4;cursor:not-allowed}
#errMsg{font-size:12px;color:#f04433;background:rgba(240,68,51,.08);border:1px solid rgba(240,68,51,.2);border-radius:8px;padding:8px;display:none}
.g-discord{font-size:11px;color:#5a5f78}.g-discord a{color:#6b9bff;text-decoration:none}
</style>
</head>
<body>
<div id="gate">
  <div class="g-logo">Money<span>Scripts</span></div>
  <div class="g-title">Insert your key here</div>
  <div class="g-sub">Enter your access key to unlock this simulator.</div>
  <input id="keyInput" type="text" placeholder="EXT-XXXXX-XXXXX-XXXXX-XXXXX" maxlength="26" autocomplete="off" spellcheck="false">
  <div id="errMsg"></div>
  <button id="unlockBtn" onclick="verify()">Unlock</button>

  <div class="g-discord">No key? <a href="https://discord.gg/moneyscripts" target="_blank">discord.gg/moneyscripts</a></div>
</div>

const COLLECTION='extension_keys';

firebase.initializeApp({
  apiKey:"AIzaSyBTmQ9r1AjeBVDApUm9TnoRWviC5v4EKuU",
  authDomain:"moneyscripts-75c7c.firebaseapp.com",
  projectId:"moneyscripts-75c7c",
  storageBucket:"moneyscripts-75c7c.firebasestorage.app",
  messagingSenderId:"1084377638800",
  appId:"1:1084377638800:web:288d7558a7efbe74aef515"
});
const db=firebase.firestore();

function getDevice(){
  let d=localStorage.getItem('ms_device');
  if(!d){d='DEV-'+Math.random().toString(36).substr(2,9).toUpperCase();localStorage.setItem('ms_device',d);}
  return d;
}

async function checkKey(key){
  try{
    const doc=await db.collection(COLLECTION).doc(key).get();
    if(!doc.exists) return {valid:false,reason:'Invalid key'};
    const d=doc.data();
    if(d.status==='disabled') return {valid:false,reason:'Key has been disabled'};
    if(d.expires&&d.expires.toDate&&d.expires.toDate()<new Date()) return {valid:false,reason:'Key has expired'};
    const dev=getDevice();
    if(d.deviceId&&d.deviceId!==dev) return {valid:false,reason:'Key already used on another device'};
    return {valid:true,docId:doc.id};
  }catch(e){return {valid:false,reason:'Error: '+e.message};}
}

// Auto-unlock if key already stored
(async function(){
  const k=localStorage.getItem('ms_key');
  if(!k) return;
  const r=await checkKey(k);
  if(r.valid) unlock();
  else localStorage.removeItem('ms_key');
})();

async function verify(){
  const key=document.getElementById('keyInput').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  const err=document.getElementById('errMsg');
  if(!key){showErr('Enter your key');return;}
  btn.disabled=true;btn.textContent='Verifying...';err.style.display='none';
  const r=await checkKey(key);
  if(r.valid){
    await db.collection(COLLECTION).doc(r.docId).update({
      deviceId:getDevice(),
      status:'locked',
      lastUsed:firebase.firestore.FieldValue.serverTimestamp()
    });
    localStorage.setItem('ms_key',key);
    btn.textContent='✓ Unlocked!';
    btn.style.background='#00b06c';
    setTimeout(unlock,600);
  }else{
    showErr(r.reason);
    btn.disabled=false;btn.textContent='Unlock';
  }
}

function unlock(){
  const html=atob(ENCODED);
  document.open();document.write(html);document.close();
}

function showErr(msg){
  const e=document.getElementById('errMsg');
  e.textContent=msg;e.style.display='block';
}

document.getElementById('keyInput').addEventListener('keydown',e=>{if(e.key==='Enter')verify();});
</script>
