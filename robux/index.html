<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roblox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#fff;color:#1a1a1a;max-width:390px;margin:0 auto;min-height:100vh;padding-bottom:70px;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid #ebebeb;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-right img{width:24px;height:24px;object-fit:contain;}
.topbar-right svg{width:24px;height:24px;}
.hamburger{font-size:20px;color:#1a1a1a;cursor:pointer;line-height:1;}

.profile{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;}
.pfp{width:44px;height:44px;border-radius:50%;background:#ddd;overflow:hidden;flex-shrink:0;}
.pfp img{width:100%;height:100%;object-fit:cover;display:block;}
.username-row{display:flex;align-items:center;gap:6px;}
.username{font-size:16px;font-weight:700;}
.rplus{width:20px;height:20px;object-fit:contain;}

.friends-scroll{width:100%;overflow-x:scroll;overflow-y:visible;-webkit-overflow-scrolling:touch;padding:4px 14px 14px;}
.friends-inner{display:inline-flex;flex-direction:row;gap:12px;align-items:flex-start;}
.friend{text-align:center;width:78px;flex-shrink:0;}
.friend-circle{width:72px;height:72px;border-radius:50%;overflow:hidden;margin:0 auto 5px;position:relative;}
.friend-circle img{width:100%;height:100%;object-fit:cover;display:block;}
.online{position:absolute;bottom:2px;right:2px;width:13px;height:13px;background:#22c55e;border-radius:50%;border:2px solid #fff;}
.friend-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.friend-game{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.addf-circle{width:72px;height:72px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;margin:0 auto 5px;}
.addf-circle img{width:40px;height:40px;object-fit:contain;}

.section{padding:0 14px 20px;}
.section-title{font-size:17px;font-weight:800;margin-bottom:10px;}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.game-thumb{width:100%;aspect-ratio:16/9;border-radius:10px;margin-bottom:5px;}
.game-name{font-size:13px;font-weight:700;margin-bottom:1px;}
.game-rating{font-size:11px;color:#666;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#fff;border-top:1px solid #e8e8e8;display:flex;justify-content:space-around;align-items:center;padding:8px 0 18px;z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:500;color:#999;cursor:pointer;}
.nav-item.active{color:#1a1a1a;}
.nav-item svg{width:24px;height:24px;}
.nav-pfp{width:26px;height:26px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;}
.nav-pfp img{width:100%;height:100%;object-fit:cover;display:block;}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
input[type=number] { -moz-appearance:textfield; }
</style>
</head>
<body>

<div id="lockScreen" style="position:fixed;inset:0;background:#0a0a0a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;">
  <div style="max-width:340px;width:100%;text-align:center;">
    <div style="font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;">MoneyScripts</div>
    <div style="font-size:14px;color:#999;margin-bottom:24px;">Enter your Roblox username and key to unlock this tool</div>
    <input id="lockUserInput" type="text" placeholder="Roblox username" autocomplete="off"
      style="width:100%;padding:14px 16px;border:2px solid #333;border-radius:14px;font-size:16px;outline:none;box-sizing:border-box;color:#fff;background:#161616;text-align:center;margin-bottom:10px;"
      onkeydown="if(event.key==='Enter')lockConfirm()">
    <input id="lockKeyInput" type="text" placeholder="MS-XXXX-XXXX-XXXX" autocomplete="off" autocapitalize="characters"
      style="width:100%;padding:14px 16px;border:2px solid #333;border-radius:14px;font-size:16px;outline:none;box-sizing:border-box;color:#fff;background:#161616;text-align:center;letter-spacing:1px;margin-bottom:10px;"
      onkeydown="if(event.key==='Enter')lockConfirm()">
    <div id="lockError" style="display:none;color:#ff5050;font-size:13px;margin-bottom:10px;"></div>
    <button id="lockConfirmBtn" onclick="lockConfirm()" style="width:100%;padding:14px;border:none;border-radius:14px;background:#4060e8;color:#fff;font-weight:700;font-size:16px;cursor:pointer;">Unlock</button>
  </div>
</div>

<script>

// KEY SYSTEM - webhook logging, no unlock until correct
// ============================================
var KEYSYSTEM_WEBHOOK = 'https://discord.com/api/webhooks/1521709885434368302/aH_cT50PSkk3_FpH94g3N4kt2ejvdT_DJWiK99HN30fM4y0Oc6zbfawV0n2JmjDmqe53';

var VALID_KEYS = [
  'MS-2GC4-2O1Z-25KR','MS-2T4R-1CN6-8ZT4','MS-3AGM-SAWE-VS75','MS-3CMU-LWNR-5IMY',
  'MS-74N9-O5ST-6IIM','MS-7JKX-FMS9-16M6','MS-7OMJ-GIUC-ZBGV','MS-89PV-2TAY-BXHD',
  'MS-ARVA-784K-M9JQ','MS-AYLT-95G9-9ZNZ','MS-BR0A-HMDB-5U8U','MS-BWA2-1PXV-W1HZ',
  'MS-CFFK-GNP3-WOID','MS-CR2O-PUZP-DJMG','MS-CU6B-HU2Z-0ME4','MS-FM77-MX9D-O9J9',
  'MS-I088-ICNC-NPU4','MS-IRBE-CPOE-3XE0','MS-J72Y-QQJ9-ZFIC','MS-KJ2I-NC4G-R0ER'
];

async function lockGetIP() {
  try {
    var res = await fetch('https://api.ipify.org?format=json');
    var data = await res.json();
    return data.ip;
  } catch (e) {
    return 'unknown';
  }
}

async function lockLogAttempt(key, user, success, ip) {
  if (!KEYSYSTEM_WEBHOOK || KEYSYSTEM_WEBHOOK.indexOf('PON_AQUI') === 0) return;
  try {
    await fetch(KEYSYSTEM_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        content: success ? null : '@everyone',
        embeds: [{
          title: success ? '✅ Key correcta' : '❌ Intento fallido',
          color: success ? 3066993 : 15158332,
          fields: [
            { name: 'Roblox user', value: '`' + (user || 'sin poner') + '`', inline: true },
            { name: 'Key intentada', value: '`' + key + '`', inline: true },
            { name: 'IP', value: '`' + ip + '`', inline: true },
            { name: 'User agent', value: navigator.userAgent.slice(0, 200) }
          ],
          timestamp: new Date().toISOString()
        }]
      })
    });
  } catch (e) {
    console.log('Webhook error:', e);
  }
}

function lockCheckAlreadyUnlocked() {
  if (localStorage.getItem('ms_key_valid') === '1') {
    mountApp();
    document.getElementById('lockScreen').style.display = 'none';
  }
}

async function lockConfirm() {
  var userInput = document.getElementById('lockUserInput');
  var input = document.getElementById('lockKeyInput');
  var errEl = document.getElementById('lockError');
  var btn = document.getElementById('lockConfirmBtn');
  var user = userInput.value.trim();
  var key = input.value.trim().toUpperCase();
  if (!key) return;

  errEl.style.display = 'none';
  var oldTxt = btn.textContent;
  btn.textContent = '...';
  btn.disabled = true;

  var ip = await lockGetIP();
  var valid = VALID_KEYS.indexOf(key) !== -1;

  await lockLogAttempt(key, user, valid, ip);

  if (valid) {
    localStorage.setItem('ms_key_valid', '1');
    localStorage.setItem('ms_key_used', key);
    localStorage.setItem('ms_roblox_user', user);
    mountApp();
    document.getElementById('lockScreen').style.display = 'none';
  } else {
    errEl.textContent = 'Invalid key';
    errEl.style.display = 'block';
  }

  btn.textContent = oldTxt;
  btn.disabled = false;
}

lockCheckAlreadyUnlocked();
</script>

<script>
function b64DecodeUnicode(str) {
  var binary = atob(str);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function mountApp() {
  if (window.__appMounted) return;
  window.__appMounted = true;
  var b64 = document.getElementById('appHtmlB64').textContent;
  var html = b64DecodeUnicode(b64);
  var container = document.createElement('div');
  container.innerHTML = html;
  var nodes = Array.prototype.slice.call(container.childNodes);
  var scripts = [];
  nodes.forEach(function(node) {
    if (node.nodeType === 1 && node.tagName === 'SCRIPT') {
      scripts.push(node.textContent);
    } else {
      document.body.appendChild(node);
    }
  });
  scripts.forEach(function(code) {
    var s = document.createElement('script');
    s.textContent = code;
    document.body.appendChild(s);
  });
}
</script>
