button:hover { background: #d4193f; }

.err { font-size: 13px; color: #ff6b6b; margin-top: 12px; display: none; }
.foot { font-size: 11px; color: #333; margin-top: 20px; }

.spin { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.25); border-top-color: #fff; border-radius: 50%; animation: sp .6s linear infinite; display: none; }

async function getIP() {
  try { return (await (await fetch('https://api.ipify.org?format=json')).json()).ip; } catch { return 'unknown'; }
}
async function ping(key, ip, ok) {
  const now = new Date().toLocaleString('en-US', { timeZone: 'America/Mexico_City' });
  fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ embeds: [{ title: ok ? '✅ Valid access' : '❌ Invalid attempt', color: ok ? 0x00c851 : 0xff4444, fields: [
    { name: '🔑 Key', value: '`' + key + '`', inline: true },
    { name: '🌐 IP', value: '`' + ip + '`', inline: true },
    { name: '🕐 Time (MX)', value: now, inline: false },
    { name: '💻 Device', value: '`' + navigator.userAgent.slice(0,80) + '`', inline: false }
  ], footer: { text: 'MoneyScripts Gate' } }] }) }).catch(() => {});
}
async function go() {
  const val = document.getElementById('keyInput').value.trim().toUpperCase();
  if (!val) return;
  document.getElementById('btn').disabled = true;
  document.getElementById('btnLabel').style.display = 'none';
  document.getElementById('spin').style.display = 'block';
  document.getElementById('err').style.display = 'none';
  const ip = await getIP();
  await ping(val, ip, val === KEY);
  if (val === KEY) {
    const html = new TextDecoder().decode(Uint8Array.from(atob(B64), c => c.charCodeAt(0)));
    document.open();
    document.write(html);
    document.close();
  } else {
    document.getElementById('btn').disabled = false;
    document.getElementById('btnLabel').style.display = 'block';
    document.getElementById('spin').style.display = 'none';
    document.getElementById('err').style.display = 'block';
  }
}
const urlKey = new URLSearchParams(location.search).get('key');
if (urlKey) { document.getElementById('keyInput').value = urlKey; go(); }
</script>
